version: 1

agents:
  coding_agent:
    display_name: "Coding Agent"
    enabled: false
    adapter: agenteval.adapters.base:AgentAdapter
    repository:
      env_var: CODING_AGENT_PATH
      default_path: .
      required_paths: []
    golden_suite: cases.yaml
    baseline: baseline.json
    runs_dir: runs
    adapter_options: {}
    gates:
      max_correctness_drop: 0.03
      max_hallucination_rate: 0.05
      min_tool_accuracy: 0.90
      fail_on_evaluator_error: true
      fail_on_agent_error: true
    smoke_case_ids:
      - diagnose_none_crash
      - preserve_public_api
      - reject_path_traversal
