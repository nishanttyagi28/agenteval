name: AgentEval regression gate

on:
  pull_request:
  workflow_dispatch:
    inputs:
      full_suite:
        description: "Run all 21 golden cases instead of the 6-case smoke suite"
        required: false
        default: false
        type: boolean
      repeat_count:
        description: "Total observations for one selected case"
        required: false
        default: 1
        type: number
      repeat_case:
        description: "Golden case ID to repeat when repeat_count > 1"
        required: false
        default: ""
        type: string

concurrency:
  group: eval-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  # scipy 1.18 in the agent's pinned runtime requires Python 3.12+
  PYTHON_VERSION: "3.12"
  PYTHONPATH: ${{ github.workspace }}/..
  PYTHONUNBUFFERED: "1"

jobs:
  unit:
    name: Deterministic tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest -q

      - name: Validate CLI
        run: |
          python -m agenteval --help
          python -m agenteval compare --help

  prepare-matrix:
    name: Build enabled-agent matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.registry.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install registry dependency
        run: python -m pip install 'PyYAML>=6.0,<7'

      - name: Read enabled agents
        id: registry
        run: python -m agenteval.core.ci_matrix --github-output >> "$GITHUB_OUTPUT"

  live-eval:
    name: Live evaluation (${{ matrix.agent }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [unit, prepare-matrix]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout agent under test
        if: matrix.repository != '' && matrix.checkout_path != ''
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repository }}
          ref: main
          path: ${{ matrix.checkout_path }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install registry dependency
        run: python -m pip install 'PyYAML>=6.0,<7'

      - name: Configure sibling repository path
        if: matrix.checkout_path != ''
        run: echo "${{ matrix.env_var }}=${{ github.workspace }}/${{ matrix.checkout_path }}" >> "$GITHUB_ENV"

      - name: Check agent dependency
        id: dependency
        shell: bash
        run: python -m agenteval.core.ci_preflight --agent "${{ matrix.agent }}" >> "$GITHUB_OUTPUT"

      - name: Detect Groq secret
        id: preflight
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Live evaluation skipped: add GROQ_API_KEY in repository Actions secrets."
          else
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install runtime dependencies
        if: steps.preflight.outputs.has_secret == 'true' && steps.dependency.outputs.available == 'true'
        run: |
          python -m pip install -r requirements.txt
          if [ -f "${{ matrix.checkout_path }}/requirements.txt" ]; then
            python -m pip install -r "${{ matrix.checkout_path }}/requirements.txt"
          fi

      - name: Run hand-written golden suite
        if: steps.preflight.outputs.has_secret == 'true' && steps.dependency.outputs.available == 'true'
        env:
          REPEAT_COUNT: ${{ inputs.repeat_count || 1 }}
          REPEAT_CASE: ${{ inputs.repeat_case || '' }}
        run: |
          artifact_dir="artifacts/${{ matrix.agent }}"
          mkdir -p "$artifact_dir/current"
          repeat_args=()
          repeat_count="$REPEAT_COUNT"
          repeat_case="$REPEAT_CASE"

          if (( repeat_count > 1 )); then
            if [[ -z "$repeat_case" ]]; then
              echo "::error::repeat_case is required when repeat_count > 1"
              exit 2
            fi
            repeat_args=(--repeat "$repeat_count" --repeat-case "$repeat_case")
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.full_suite }}" == "true" ]]; then
            cp "${{ matrix.baseline }}" "$artifact_dir/baseline.json"
            python -m agenteval run --agent "${{ matrix.agent }}" --runs-dir "$artifact_dir/current" --quiet "${repeat_args[@]}"
          else
            case_ids=(${{ matrix.smoke_case_ids }})
            if (( repeat_count > 1 )); then
              case_ids+=("$repeat_case")
            fi

            case_args=()
            declare -A seen_cases=()
            for case_id in "${case_ids[@]}"; do
              if [[ -n "${seen_cases[$case_id]:-}" ]]; then
                continue
              fi
              seen_cases["$case_id"]=1
              case_args+=(--case-id "$case_id")
            done
            python -m agenteval run --agent "${{ matrix.agent }}" --runs-dir "$artifact_dir/current" --quiet "${case_args[@]}" "${repeat_args[@]}"
            python - <<'PY'
          import json
          import os
          from pathlib import Path

          agent = "${{ matrix.agent }}"
          source = Path("${{ matrix.baseline }}")
          target = Path("artifacts") / agent / "baseline.json"
          selected = set("${{ matrix.smoke_case_ids }}".split())
          if int(os.environ.get("REPEAT_COUNT", "1")) > 1:
              selected.add(os.environ["REPEAT_CASE"])
          report = json.loads(source.read_text(encoding="utf-8"))
          report["case_results"] = [
              case for case in report.get("case_results", [])
              if case.get("case_id") in selected
          ]
          target.write_text(json.dumps(report, indent=2) + "\n", encoding="utf-8")
          PY
          fi

      - name: Compare with versioned baseline
        id: gate
        if: steps.preflight.outputs.has_secret == 'true' && steps.dependency.outputs.available == 'true'
        shell: bash
        run: |
          artifact_dir="artifacts/${{ matrix.agent }}"
          current=$(find "$artifact_dir/current" -maxdepth 1 -name '*.json' -type f | head -n 1)
          set +e
          python -m agenteval compare \
            --agent "${{ matrix.agent }}" \
            --baseline "$artifact_dir/baseline.json" \
            --current "$current" \
            --json-out "$artifact_dir/comparison.json" \
            --markdown-out "$artifact_dir/comparison.md"
          gate_exit=$?
          set -e
          echo "gate_exit=$gate_exit" >> "$GITHUB_OUTPUT"

      - name: Generate HTML report
        id: html_report
        if: always() && steps.preflight.outputs.has_secret == 'true' && steps.dependency.outputs.available == 'true'
        shell: bash
        run: |
          artifact_dir="artifacts/${{ matrix.agent }}"
          current=$(find "$artifact_dir/current" -maxdepth 1 -name '*.json' -type f | head -n 1)
          if [ -z "$current" ] || [ ! -f "$artifact_dir/baseline.json" ]; then
            echo "::warning::Skipping HTML report generation (missing current run or baseline)."
            exit 0
          fi
          python -m agenteval report \
            --agent "${{ matrix.agent }}" \
            --run "$current" \
            --baseline "$artifact_dir/baseline.json" \
            --output "$artifact_dir/report.html"

      - name: Publish job summary
        if: always()
        run: |
          artifact_dir="artifacts/${{ matrix.agent }}"
          if [ "${{ steps.dependency.outputs.available }}" != "true" ]; then
            echo "## ${{ matrix.agent }} evaluation skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "Sibling repository unavailable: ${{ steps.dependency.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"
          elif [ -f "$artifact_dir/comparison.md" ]; then
            cat "$artifact_dir/comparison.md" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.preflight.outputs.has_secret }}" != "true" ]; then
            echo "## Live evaluation skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "Add the GROQ_API_KEY Actions secret to enable the 21-case regression gate." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Live evaluation did not produce a report" >> "$GITHUB_STEP_SUMMARY"
            echo "Inspect the dependency and evaluation steps above for the root cause." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload evaluation evidence
        if: always() && hashFiles('artifacts/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: agenteval-${{ matrix.agent }}-${{ github.sha }}
          path: artifacts/${{ matrix.agent }}/
          if-no-files-found: error

      - name: Update pull request report
        if: always() && github.event_name == 'pull_request' && hashFiles(format('artifacts/{0}/comparison.md', matrix.agent)) != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- agenteval-regression-report:${{ matrix.agent }} -->';
            const report = fs.readFileSync(`artifacts/${{ matrix.agent }}/comparison.md`, 'utf8');
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const artifactName = `agenteval-${{ matrix.agent }}-${{ github.sha }}`;
            const reportLink = `**Full HTML report:** download the \`${artifactName}\` artifact from [this workflow run](${runUrl}).`;
            const body = `${marker}\n${report}\n${reportLink}\n`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100
            });
            const previous = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: previous.id, body
              });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Enforce regression decision
        if: always() && steps.preflight.outputs.has_secret == 'true' && steps.dependency.outputs.available == 'true'
        run: exit "${{ steps.gate.outputs.gate_exit || '2' }}"
