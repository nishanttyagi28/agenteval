name: AgentEval action smoke test

on:
  pull_request:
    paths:
      - action.yml
      - adapters/**
      - core/**
      - examples/action_demo/**
      - .github/workflows/action-smoke.yml
      - pyproject.toml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Composite action smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Evaluate deterministic demo agent
        id: agenteval
        uses: ./
        with:
          agent: action_demo
          config-file: examples/action_demo/agents.yaml
          agent-path: examples/action_demo
          cases-file: examples/action_demo/cases.yaml
          baseline-file: examples/action_demo/baseline.json
          runs-dir: .agenteval/action-smoke
          no-llm-judge: "true"

      - name: Verify action outputs
        shell: bash
        env:
          PASSED: ${{ steps.agenteval.outputs.passed }}
          REPORT_PATH: ${{ steps.agenteval.outputs.report-path }}
          COMPARISON_PATH: ${{ steps.agenteval.outputs.comparison-path }}
        run: |
          set -euo pipefail
          test "$PASSED" = "true"
          test -f "$REPORT_PATH"
          test -f "$COMPARISON_PATH"
          python -c 'import json, os; assert json.load(open(os.environ["COMPARISON_PATH"], encoding="utf-8"))["passed"] is True'

