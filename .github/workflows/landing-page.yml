name: Deploy AgentEval landing page

on:
  push:
    branches: [main]
    paths:
      - "landing-page/**"
      - ".github/workflows/landing-page.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5
        # Pages is provisioned once at the repository level with build_type=workflow.
        # GITHUB_TOKEN cannot create a Pages site, so keep runtime enablement disabled.
        with:
          enablement: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: landing-page/package-lock.json

      - name: Install landing-page dependencies
        working-directory: landing-page
        run: npm ci

      - name: Install Chromium
        working-directory: landing-page
        run: npx playwright install --with-deps chromium

      - name: Test and build static site
        working-directory: landing-page
        run: npm test

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: landing-page/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
