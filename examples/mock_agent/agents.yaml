version: 1

agents:
  mock_agent:
    display_name: Mock agent (zero-dependency demo)
    enabled: true
    adapter: examples.mock_agent.adapter:MockAgentAdapter
    repository:
      env_var: AGENTEVAL_MOCK_AGENT_PATH
      default_path: .
      required_paths:
        - adapter.py
    golden_suite: cases.yaml
    baseline: baseline.json
    runs_dir: runs
    adapter_options: {}
    gates:
      max_correctness_drop: 0
      max_hallucination_rate: 0
      min_tool_accuracy: 1
      fail_on_evaluator_error: true
      fail_on_agent_error: true
    smoke_case_ids:
      - simple_addition
      - capital_lookup
      - inventory_count
